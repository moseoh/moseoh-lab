version: 2

updates:
  # Discord 봇의 Python 의존성과 uv 잠금 파일을 관리합니다.
  - package-ecosystem: "pip"
    directory: "/discord-bot"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "python"
      - "discord-bot"
    commit-message:
      prefix: "deps"

  # Telegram 봇의 Python 의존성을 관리합니다.
  - package-ecosystem: "pip"
    directory: "/telegram-bot"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:10"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "python"
      - "telegram-bot"
    commit-message:
      prefix: "deps"

  # 썸네일 생성 도구의 npm 의존성을 관리합니다.
  - package-ecosystem: "npm"
    directory: "/tools/thumbnail-generator"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:20"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "javascript"
      - "thumbnail-generator"
    commit-message:
      prefix: "deps"

  # Discord 봇 Dockerfile의 베이스 이미지를 관리합니다.
  - package-ecosystem: "docker"
    directory: "/discord-bot"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "docker"
      - "discord-bot"
    commit-message:
      prefix: "deps"

  # Telegram 봇 Dockerfile의 베이스 이미지를 관리합니다.
  - package-ecosystem: "docker"
    directory: "/telegram-bot"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:40"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "docker"
      - "telegram-bot"
    commit-message:
      prefix: "deps"

  # GitHub Actions 워크플로에서 사용하는 액션 버전을 관리합니다.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:50"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps"
