services:
  migrate:
    image: arigaio/atlas:latest
    container_name: telegram-bot-migrate
    volumes:
      - ./migrations:/migrations
      - telegram_bot_data:/data
    command: >
      migrate apply
      --url "sqlite:///data/telegram-bot.sqlite3"
      --dir "file:///migrations"

  bot:
    build: .
    container_name: telegram-bot
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TZ=${TZ:-Asia/Seoul}
      - SQLITE_PATH=/app/data/telegram-bot.sqlite3
    volumes:
      - telegram_bot_data:/app/data

volumes:
  telegram_bot_data:
