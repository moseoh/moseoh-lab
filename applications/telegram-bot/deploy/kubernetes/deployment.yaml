apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-bot
  labels:
    app.kubernetes.io/name: telegram-bot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: telegram-bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: telegram-bot
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: copy-migrations
          image: ghcr.io/moseoh/telegram-bot:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - cp -R /app/migrations/. /migrations/
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: migrations
              mountPath: /migrations
        - name: migrate
          image: arigaio/atlas:1.2.2
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /tmp
          args:
            - migrate
            - apply
            - --url
            - sqlite:///data/telegram-bot.sqlite3
            - --dir
            - file:///migrations
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
            - name: migrations
              mountPath: /migrations
              readOnly: true
            - name: tmp
              mountPath: /tmp
      containers:
        - name: bot
          image: ghcr.io/moseoh/telegram-bot:latest
          imagePullPolicy: IfNotPresent
          command:
            - /app/.venv/bin/telegram-bot
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-bot
                  key: TELEGRAM_BOT_TOKEN
            - name: TZ
              value: Asia/Seoul
            - name: SQLITE_PATH
              value: /app/data/telegram-bot.sqlite3
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: telegram-bot-data
        - name: migrations
          emptyDir: {}
        - name: tmp
          emptyDir: {}
